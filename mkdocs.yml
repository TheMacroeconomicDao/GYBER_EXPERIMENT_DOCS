# MkDocs Material Configuration
# CyberSocium Foundation Documentation
# https://themacroeconomicdao.github.io/GYBER_EXPERIMENT_DOCS/

site_name: CyberSocium Foundation
site_url: https://themacroeconomicdao.github.io/GYBER_EXPERIMENT_DOCS/
site_description: >-
  Theoretical foundations and technical documentation for CyberSocium —
  a decentralized macroeconomic system based on 12 fundamental axioms.
site_author: Gybernaty Research Collective
site_dir: _build
copyright: Copyright &copy; 2024-2026 Gybernaty Community — AGPL-3.0

repo_name: TheMacroeconomicDao/GYBER_EXPERIMENT_DOCS
repo_url: https://github.com/TheMacroeconomicDao/GYBER_EXPERIMENT_DOCS
edit_uri: edit/main/site/docs/

docs_dir: site/docs

theme:
  name: material
  language: en
  custom_dir: site/overrides

  palette:
    - scheme: slate
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

  font:
    text: Inter
    code: JetBrains Mono

  icon:
    repo: fontawesome/brands/github
    logo: material/atom-variant

  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.path
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.action.edit
    - content.action.view
    - toc.follow
    - announce.dismiss

plugins:
  - search:
      lang:
        - en
        - ru
      separator: '[\s\-\.]+'
  - tags

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/TheMacroeconomicDao
      name: GitHub
    - icon: fontawesome/brands/telegram
      link: https://t.me/HeadsHub
      name: Telegram Community
  generator: false

extra_css:
  - assets/stylesheets/extra.css

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Theory:
    - Introduction: theory/introduction.md
    - Literature Review: theory/literature-review.md
    - Axiomatic Foundation: theory/axioms.md
    - CyberSocial Corporation: theory/cybersocial-corporation.md
    - Evolution of Forms: theory/evolution-of-forms.md
    - PMIP & Selection: theory/pmip-selection.md
    - Formal Model: theory/formal-model.md
  - Architecture:
    - Overview: architecture/overview.md
    - Tokenomics (GBR): architecture/tokenomics.md
    - Gyber Social Platform: architecture/gsp.md
    - GyberNet: architecture/gybernet.md
    - GyberComputer: architecture/gybercomputer.md
    - MacroeconomicDAO: architecture/macroeconomic-dao.md
    - Legal Framework (DUNA): architecture/legal-duna.md
    - AiC Department: architecture/aic.md
  - DAO Taxonomy: dao/four-class-model.md
  - Ecosystem: ecosystem/applications.md
  - Legal:
    - Association Agreement: legal/association-agreement.md
    - Legal Brief: legal/briff.md
    - Community Protection: legal/community-protection.md
  - Smart Contracts:
    - Overview: contracts/overview.md
    - GybernatyUnitManager: contracts/unit-manager.md
  - Analysis:
    - Comparative Analysis: analysis/comparative.md
    - Discussion: analysis/discussion.md
  - Roadmap: roadmap.md
  - Appendices:
    - Conclusion: appendices/conclusion.md
    - Bibliography: appendices/bibliography.md
    - Glossary & Addresses: appendices/appendices-combined.md
